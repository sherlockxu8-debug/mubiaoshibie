<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>检测历史 - 校园失物寻找</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <span class="logo-icon">📹</span>
          <div class="logo-text">
            <h1>校园失物寻找</h1>
            <p>基于YOLO智能检测的监控视频物品检索系统</p>
          </div>
        </div>
        <nav class="nav">
          <a href="index.html" class="nav-item" data-page="index">
            <span class="nav-icon">🏠</span>首页
          </a>
          <a href="history.html" class="nav-item active" data-page="history">
            <span class="nav-icon">📋</span>历史
          </a>
          <a href="search.html" class="nav-item" data-page="search">
            <span class="nav-icon">🔍</span>搜索
          </a>
          <a href="camera.html" class="nav-item" data-page="camera">
            <span class="nav-icon">📷</span>摄像头
          </a>
        </nav>
      </div>
    </header>

    <main class="main">
      <div class="container">
        <section id="page-history" class="page active">
          <div class="page-header">
            <div class="header-left">
              <h2>📋 检测历史</h2>
              <p>查看所有视频检测记录</p>
            </div>
            <div class="header-actions">
              <button class="btn-secondary" id="btn-refresh">
                <span>🔄</span> 刷新
              </button>
              <select id="status-filter" class="filter-select">
                <option value="">全部状态</option>
                <option value="pending">等待中</option>
                <option value="processing">处理中</option>
                <option value="completed">已完成</option>
                <option value="failed">失败</option>
              </select>
            </div>
          </div>

          <div class="card">
            <div id="video-list" class="video-list"></div>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <p>校园失物寻找系统 Lost&Found © 2024</p>
    </footer>
  </div>

  <div id="toast-container"></div>
  <div class="modal" id="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">提示</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pages/history.js"></script>
</body>
</html>
